<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product | Neha Rani Studio</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>


<body>


<header class="header">

<div class="header-left">
<a href="index.html">
<i class="fa-solid fa-arrow-left"></i>
</a>
</div>


<div class="header-center">

<h2>Neha Rani Studio</h2>

</div>


<div class="header-right">

<i class="fa-solid fa-cart-shopping"></i>

</div>

</header>



<section class="single-product">


<div class="product-gallery">


<img id="mainProductImage" src="images/products/product1-1.jpg">


<div class="small-images">

<img src="images/products/product1-1.jpg">
<img src="images/products/product1-2.jpg">
<img src="images/products/product1-3.jpg">
<img src="images/products/product1-4.jpg">

</div>


</div>



<div class="product-details">


<h1 id="productName">
Luxury Gift Box
</h1>


<h2 id="productPrice">
Rs. 2,999
</h2>



<div class="stars">
⭐⭐⭐⭐⭐
</div>



<p>

Premium quality product from Neha Rani Studio.
Beautiful design with luxury finishing.
Perfect for gifting and special occasions.

</p>



<div class="options">

<h3>Select Option</h3>

<button>Small</button>
<button>Medium</button>
<button>Large</button>

</div>



<button class="add-product-cart">

Add To Cart 🛒

</button>



<a class="whatsapp-product"
href="https://wa.me/923045255325"
target="_blank">

Buy On WhatsApp

</a>



<div class="reviews-box">

<h2>Customer Reviews</h2>

<p>⭐⭐⭐⭐⭐ Amazing quality and packaging.</p>

<p>⭐⭐⭐⭐⭐ Loved the product.</p>

</div>



</div>


</section>



<script>


let smallImages=document.querySelectorAll(".small-images img");

let mainImage=document.getElementById("mainProductImage");


smallImages.forEach(img=>{

img.onclick=function(){

mainImage.src=this.src;

}

});


</script>



</body>
</html>
