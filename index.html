<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neha Rani Studio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#fff8fb;
color:#444;
}

header{
background:linear-gradient(135deg,#ffd6e7,#fff);
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
}

.logo{
font-size:30px;
font-weight:bold;
color:#d84b87;
}

nav a{
margin:15px;
text-decoration:none;
color:#444;
font-weight:bold;
}

.hero{
text-align:center;
padding:80px 20px;
background:linear-gradient(#ffe9f3,#fff);
}

.hero img{
width:220px;
border-radius:50%;
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.hero h1{
margin-top:25px;
font-size:45px;
color:#d84b87;
}

.hero p{
font-size:20px;
margin:15px;
}

.btn{
display:inline-block;
padding:14px 35px;
background:#ff5f9e;
color:white;
border-radius:40px;
text-decoration:none;
font-size:18px;
margin-top:20px;
}

</style>

</head>

<body>

<header>

<div class="logo">
Neha Rani Studio
</div>

<nav>

<a href="#">Home</a>

<a href="#">Products</a>

<a href="#">About</a>

<a href="#">Contact</a>

</nav>

</header>

<section class="hero">

<img src="logo.png">

<h1>Customized With Love 💖</h1>

<p>Fashion • Bags • Jewellery • Gift Hampers</p>

<a class="btn" href="#">Shop Now</a>

</section>

</body>
</html>
